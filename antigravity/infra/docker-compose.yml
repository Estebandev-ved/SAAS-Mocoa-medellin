version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antigravity}
      MYSQL_USER: ${MYSQL_USER:-antigravity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antigravity}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "3306:3306"
    networks:
      - antigravity_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ag-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - antigravity_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: ag-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-antigravity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antigravity}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antigravity}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antigravity_network
    volumes:
      - ../logs:/app/logs

  instance-manager:
    build:
      context: ..
      dockerfile: Dockerfile.instance
    container_name: ag-instance-manager
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-antigravity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antigravity}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antigravity}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - antigravity_network
    volumes:
      - ../auth_info:/app/auth_info

  queue:
    build:
      context: ..
      dockerfile: Dockerfile.queue
    container_name: ag-queue
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-antigravity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antigravity}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antigravity}
      REDIS_HOST: redis
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antigravity_network

  brain:
    build:
      context: ..
      dockerfile: Dockerfile.brain
    container_name: ag-brain
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-antigravity}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antigravity}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antigravity}
      REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antigravity_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ag-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:3002}
      VITE_SOCKET_URL: ${FRONTEND_SOCKET_URL:-http://localhost:3001}
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
    networks:
      - antigravity_network

volumes:
  mysql_data:
  redis_data:

networks:
  antigravity_network:
    driver: bridge
