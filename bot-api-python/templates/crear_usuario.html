<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Usuario - NOMÁ</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .crear-usuario-container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(54,162,235,0.08);
            padding: 38px 32px 28px 32px;
        }
        .crear-usuario-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #2d3e50;
        }
        .crear-usuario-container input, .crear-usuario-container select {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 7px;
            border: 1px solid #eaf6fb;
            font-size: 1rem;
        }
        .crear-usuario-container button {
            width: 100%;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="crear-usuario-container">
        <form method="POST">
            {{ csrf_token() }}
            <h2>Crear Usuario</h2>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <input type="text" name="username" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            <select name="rol" required>
                <option value="vendedor">Vendedor</option>
                <option value="admin">Admin</option>
            </select>
            <button type="submit">Crear</button>
        </form>
        <a href="/usuarios"><button>Volver</button></a>
    </div>
</body>
</html>
